version: 2.1
jobs:
  build:
    docker:
      - image: 218546966473.dkr.ecr.us-east-1.amazonaws.com/circle-ci:stitch-tap-tester-uv
    steps:
      - checkout
      - run:
          name: 'Setup virtual env'
          command: |
            uv venv --python 3.12 /usr/local/share/virtualenvs/tap-pardot
            source /usr/local/share/virtualenvs/tap-pardot/bin/activate
            uv pip install -U setuptools
            uv pip install .[dev]
      - run:
          name: 'JSON Validator'
          command: |
            source /usr/local/share/virtualenvs/tap-tester/bin/activate
            stitch-validate-json tap_pardot/schemas/*.json
      - run:
          name: 'pylint'
          command: |
            source /usr/local/share/virtualenvs/tap-pardot/bin/activate
            pylint tap_pardot -d C,R,W
      - add_ssh_keys
      - run:
          name: "Unit Tests"
          command: |
            source /usr/local/share/virtualenvs/tap-pardot/bin/activate
            mkdir -p test_output
            coverage run -m pytest --junitxml=test_output/report.xml tests/unittests
            coverage html
      - run:
          name: "Mock Integration Tests"
          command: |
            source /usr/local/share/virtualenvs/tap-pardot/bin/activate
            uv pip install pytest
            python -m pytest tests/mock_integration/ -v
      - run:
          name: 'Integration Tests'
          command: |
            source /usr/local/share/virtualenvs/tap-tester/bin/activate
            uv pip install --upgrade awscli
            aws s3 cp s3://com-stitchdata-dev-deployment-assets/environments/tap-tester/tap_tester_sandbox dev_env.sh
            source dev_env.sh
            unset USE_STITCH_BACKEND
            # Temporarily move mock_integration out of the tests/ tree so that
            # run-test does not discover it
            mv tests/mock_integration /tmp/mock_integration_backup
            run-test --tap=tap-pardot tests
            mv /tmp/mock_integration_backup tests/mock_integration


workflows:
  version: 2
  commit:
    jobs:
      - build:
          context: circleci-user
  build_daily:
    triggers:
      - schedule:
          cron: "0 0 * * *"
          filters:
            branches:
              only:
                - master
    jobs:
      - build:
          context: circleci-user